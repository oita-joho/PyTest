<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Python問題</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<h1>Python 問題プリント</h1>

<div class="controls">
  <button id="btnLoad">問題作成</button>
  <button id="btnPdf">PDF出力</button>
</div>

<!-- 上部欄 -->
<div class="print-header">
  <div class="meta-box">出席番号：</div>
  <div class="meta-box">名前：</div>
  <div class="meta-box">得点：</div>
</div>

<!-- 4分割 -->
<div class="grid4">

  <!-- 完成 -->
  <div class="card">
    <h2>① 完成した問題</h2>
    <div id="masterQuestion"></div>
    <pre id="masterCode"></pre>
    <div>出力：</div>
    <div id="masterOutput"></div>
    <div id="masterExplanation"></div>
  </div>

  <!-- 基礎 -->
  <div class="card">
    <h2>② 基礎</h2>
    <div id="basicQuestion"></div>
    <pre id="basicCode"></pre>
  </div>

  <!-- 標準 -->
  <div class="card">
    <h2>③ 標準</h2>
    <div id="standardQuestion"></div>
    <pre id="standardCode"></pre>
    <div>出力：</div>
    <div id="standardOutput"></div>
  </div>

  <!-- 応用 -->
  <div class="card">
    <h2>④ 応用（コードを書け）</h2>
    <div id="advancedQuestion"></div>
    <div>出力：</div>
    <div id="advancedOutput"></div>

    <div class="write-area"></div>
    <div class="write-area"></div>
    <div class="write-area"></div>
    <div class="write-area"></div>
  </div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>

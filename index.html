<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題アプリ(Python)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <h1>Python 基礎問題アプリ</h1>

    <div class="toolbar card">
      <div class="control">
        <label for="modeSelect">問題タイプ</label>
        <select id="modeSelect">
          <option value="mixed">おまかせ</option>
          <option value="blank">空欄補充</option>
          <option value="symbol">記号問題</option>
          <option value="trace">トレース問題</option>
        </select>
      </div>

      <div class="buttons">
        <button id="btnGenerate">新しい問題を作る</button>
        <button id="btnSimilar" disabled>類題を作る</button>
        <button id="btnAnswer" disabled>解答を表示</button>
      </div>
    </div>

    <div class="card">
      <div id="status" class="status">「新しい問題を作る」を押してください。</div>

      <div id="questionArea" class="hidden">
        <div id="questionType" class="pill"></div>
        <h2 id="questionText"></h2>
        <pre id="codeBlock"></pre>

        <div class="answerBox">
          <label for="userAnswer">答え</label>
          <input id="userAnswer" type="text" placeholder="ここに入力">
          <button id="btnCheck">判定</button>
        </div>

        <div id="judgeResult" class="judge"></div>
      </div>

      <div id="solutionArea" class="hidden">
        <h3>正解</h3>
        <div id="correctAnswer" class="solution"></div>

        <h3>解説</h3>
        <div id="explanation" class="solution"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

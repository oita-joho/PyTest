<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python 問題プリント</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">

    <h1>Python 問題プリント</h1>

    <div class="controls">
      <button id="btnLoad">問題を表示</button>
      <button id="btnPdf">PDF出力</button>
    </div>

    <div class="print-header">
      <div class="meta-box">出席番号：</div>
      <div class="meta-box">名前：</div>
      <div class="meta-box">得点：</div>
    </div>

    <div class="grid4">

      <div class="card">
        <div class="pill">① 完成した問題</div>
        <div id="masterQuestion"></div>
        <pre id="masterCode"></pre>
        <div>出力：</div>
        <div id="masterOutput"></div>
        <div id="masterExplanation"></div>
      </div>

      <div class="card">
        <div class="pill basic">② 基礎</div>
        <div id="basicQuestion"></div>
        <pre id="basicCode"></pre>
      </div>

      <div class="card">
        <div class="pill standard">③ 標準</div>
        <div id="standardQuestion"></div>
        <pre id="standardCode"></pre>
        <div>出力：</div>
        <div id="standardOutput"></div>
      </div>

      <div class="card">
        <div class="pill">④ 応用（コードを書け）</div>
        <div id="advancedQuestion"></div>
        <div>出力：</div>
        <div id="advancedOutput"></div>

        <div class="write-area"></div>
        <div class="write-area"></div>
        <div class="write-area"></div>
        <div class="write-area"></div>
      </div>

    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
